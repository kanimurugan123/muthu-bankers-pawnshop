<!DOCTYPE html>
<html lang="ta">
<head>

<meta charset="UTF-8">
<title>நிர்வாகி | பேனர் மேலாண்மை</title>

<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

/* Background theme same as website */

body{
background: linear-gradient(180deg,#f3e1b0,#e6d1a0);
font-family: 'Mukta Malar', sans-serif;
}

/* Title */

.page-title{
text-align:center;
color:#8b0000;
font-size:36px;
font-weight:bold;
margin-bottom:30px;
}

/* Cards */

.card{
border-radius:15px;
border:2px solid #d4a017;
background:white;
}

/* Banner box */

.banner-box{
padding:10px;
margin-bottom:20px;
background:white;
border-radius:12px;
border:2px solid #d4a017;
transition:0.3s;
}

.banner-box:hover{
transform:scale(1.03);
box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.banner-box img{
width:100%;
height:150px;
object-fit:cover;
border-radius:8px;
}

/* Upload button */

.upload-btn{
background:#8b0000;
color:white;
font-weight:bold;
}

.upload-btn:hover{
background:#a30000;
}

/* Delete button */

.delete-btn{
background:#dc3545;
color:white;
}

</style>

</head>

<body>

<div class="container mt-5">

<h2 class="page-title">⚙️ பேனர் நிர்வாகம்</h2>

<!-- Upload Section -->

<div class="card p-4 mb-4">

<h5 class="mb-3">புதிய பேனர் பதிவேற்று</h5>

<input type="file" id="fileInput" class="form-control mb-3" multiple>

<button onclick="uploadBanners()" class="btn upload-btn">
பேனர் பதிவேற்று
</button>

</div>

<!-- Banner List -->

<div class="card p-4">

<h5 class="mb-3">பதிவேற்றப்பட்ட பேனர்கள்</h5>

<div id="bannerList" class="row"></div>

</div>

</div>
<!-- <button class="btn btn-danger mt-2" onclick="deleteBanner('FILE_NAME')">Delete</button> -->

<script src="script.js"></script>

</body>
</html>
